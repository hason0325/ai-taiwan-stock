<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI 台股決策平台{% endblock %}</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 16px; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.08) !important; }
        .display-1 { font-size: 4.5rem; font-weight: 700; }
        .btn-primary { border-radius: 12px; padding: 12px 36px; font-weight: 600; }
        .navbar { box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
        .progress { border-radius: 4px; background-color: #f0f0f0; }
        .progress-bar { border-radius: 4px; transition: width 1s ease; }
        .col-md-2-4 { flex: 0 0 auto; width: 20%; }
        @media (max-width: 768px) {
            .display-1 { font-size: 3rem; }
            .col-md-2-4 { width: 50%; }
        }
        @media (max-width: 576px) {
            .col-md-2-4 { width: 100%; }
        }
        /* 自訂顏色 */
        .border-purple { border-color: #6f42c1 !important; }
        .text-purple { color: #6f42c1 !important; }
        .bg-purple { background-color: #6f42c1 !important; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <!-- 導航欄 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-robot"></i> AI 台股決策
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">首頁</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/report">完整報告</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/history">歷史績效</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about">關於</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主要內容 -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- 頁尾 -->
    <footer class="bg-light py-3 mt-5">
        <div class="container text-center text-muted small">
            <p class="mb-0">
                <i class="bi bi-info-circle"></i> 本平台僅供決策輔助參考，不構成投資建議，投資人應自行判斷風險。
                <br>資料來源：Yahoo Finance、鉅亨網、證交所等公開資訊
            </p>
            {% if server_time %}
            <p class="mb-0 mt-1">
                <i class="bi bi-clock"></i> 伺服器時間：{{ server_time }} (台灣時間)
            </p>
            {% endif %}
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
